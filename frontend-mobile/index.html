<!DOCTYPE html>
<html lang="es" class="h-full bg-slate-50 selection:bg-indigo-500 selection:text-white">
    <head>
        <meta charset="UTF-8" />
        <!-- 1. BLOQUEO DE ZOOM MÓVIL: Evita que la pantalla se deforme al dar dos toques rápidos o pellizcar -->
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" 
        />
        <!-- 2. OPTIMIZACIÓN WEB APP: Configura el comportamiento nativo en iOS y Android -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="format-detection" content="telephone=no" />
        <title>CleanMap Mobile</title>
        <link rel="stylesheet" href="/frontend-mobile/src/index.css" />
        <!-- 3. ESTILOS NATIVOS CRÍTICOS: Trucos visuales para simular una App Real -->
        <style>
            * {
                -webkit-tap-highlight-color: transparent;
                -webkit-touch-callout: none;
                box-sizing: border-box;
            }
        
            /* Permitimos scroll en el html pero evitamos que la app se mueva hacia los lados */
            html,
            body {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                overflow-x: hidden;
                /* 👈 Bloquea el scroll horizontal */
                overflow-y: auto;
                /* 👈 Permite el scroll vertical normal */
                background-color: #a5a7b1;
                /* bg-slate-950 */
                font-family: system-ui, -apple-system, sans-serif;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="src/main.tsx"></script>
    </body>
</html>

<!-- Al levantar el cliente (npm run dev), se levanta en entorno web -->
